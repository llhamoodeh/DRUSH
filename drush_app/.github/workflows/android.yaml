name: Build & Deploy Android to Closed Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      
      - name: Increase swap
        run: |
          # Disable and remove existing swapfile if present
          sudo swapoff /swapfile || true
          sudo rm -f /swapfile

          # Create new swap
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          # Show memory status
          free -h

      # Java 17 (important)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Gradle cache
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v1

      # Flutter (with built-in cache)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Gradle optimization
      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties

      # Keystore
      - name: Decode Keystore
        run: |
          printf "%s" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # Build
      - name: Build AAB
        run: |
          flutter build appbundle \
            --release \
            --build-name=${{ secrets.APP_VERSION_NAME }} \
            --build-number=${{ secrets.APP_VERSION_CODE }}
        env:
          GRADLE_OPTS: -Xmx3g
          JAVA_TOOL_OPTIONS: -Xmx3g

      # Play upload
      - name: Decode Play API JSON
        run: |
          printf "%s" "${{ secrets.PLAY_SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > play.json

      - name: Upload to Google Play Closed Testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play.json
          packageName: parents.arabicschool.org.au
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed